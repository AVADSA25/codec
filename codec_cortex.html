<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CORTEX — CODEC Neural Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--accent:#E8711A;--green:#00e676;--red:#ff3d3d;--yellow:#ffd740;--blue:#448aff;--purple:#b388ff;--text:#e8e8f0;--dim:#555}
body{background:radial-gradient(ellipse at 50% 30%,#0c0a14 0%,#060610 40%,var(--bg) 70%);color:var(--text);font-family:'SF Pro Display',-apple-system,system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}
#cortex{position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab}
#cortex:active{cursor:grabbing}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(5,5,8,.95),rgba(5,5,8,.6),transparent);padding:16px 24px 44px;pointer-events:none}
#hud *{pointer-events:auto}
#hud h1{font-size:14px;letter-spacing:7px;color:var(--accent);text-transform:uppercase;font-weight:300}
#hud .sub{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:2px}
.back-link{color:var(--dim);text-decoration:none;font-size:11px;letter-spacing:1px;transition:color .2s;margin-bottom:4px;display:inline-block}
.back-link:hover{color:var(--accent)}
#stats{position:fixed;top:64px;right:24px;z-index:100;display:flex;gap:16px;font-size:12px}
.stat{display:flex;align-items:center;gap:6px}.stat .dot{width:8px;height:8px;border-radius:50%}
.dot.ok{background:var(--green);box-shadow:0 0 10px var(--green)}.dot.err{background:var(--red);box-shadow:0 0 10px var(--red)}.dot.warn{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
#detail{position:fixed;bottom:0;left:0;right:0;z-index:150;background:linear-gradient(0deg,rgba(5,5,8,.98),rgba(5,5,8,.9),transparent);padding:36px 24px 20px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-height:40vh;overflow-y:auto}
#detail.open{transform:translateY(0)}
#detail h2{font-size:12px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
#detail .info{font-size:12px;color:var(--dim);line-height:1.9}
#detail .info b{color:var(--text)}
#detail .close{position:absolute;top:10px;right:20px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;transition:color .2s}
#detail .close:hover{color:var(--accent)}
.legend{position:fixed;bottom:16px;right:20px;z-index:90;font-size:9px;color:var(--dim);display:flex;flex-direction:column;gap:3px;opacity:.7}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid}
.zone-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;fill:currentColor;opacity:.15;font-weight:300}
svg text{font-family:'SF Pro Display',-apple-system,system-ui,sans-serif}
@keyframes flowDash{to{stroke-dashoffset:-20}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#skills-panel{position:fixed;left:0;top:0;bottom:0;width:320px;z-index:100;background:linear-gradient(90deg,rgba(5,5,8,.98) 80%,transparent);padding:70px 20px 20px;transform:translateX(-100%);transition:transform .35s cubic-bezier(.22,1,.36,1);overflow-y:auto}
#skills-panel.open{transform:translateX(0)}
#skills-panel h2{font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
#skills-panel .close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
#skills-panel .close:hover{color:var(--accent)}
.skill-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:11px;color:var(--dim);transition:background .15s;cursor:default}
.skill-item:hover{background:rgba(232,113,26,.06);color:var(--text)}
.skill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.skill-name{color:var(--text);font-weight:500;flex:1}
.skill-triggers{font-size:9px;color:var(--dim);opacity:.6;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.skill-count{font-size:10px;color:var(--dim);margin-bottom:10px;letter-spacing:1px}
.skill-search{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 10px;color:var(--text);font-size:11px;margin-bottom:12px;outline:none}
.skill-search:focus{border-color:var(--accent)}
.skill-search::placeholder{color:var(--dim)}
#settings-float{position:fixed;bottom:20px;left:20px;z-index:90;background:rgba(5,5,8,.85);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 16px;font-size:10px;color:var(--dim);line-height:1.8;backdrop-filter:blur(10px);max-width:220px}
#settings-float b{color:var(--text);font-weight:500}
#settings-float .setting-row{display:flex;justify-content:space-between;gap:8px}
#settings-float .setting-val{color:var(--accent);text-align:right;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#settings-float h3{font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;opacity:.7}
#last-check{font-size:10px;color:var(--dim);opacity:.5}
.detail-actions{display:flex;gap:8px;margin:12px 0}
.detail-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 12px;color:var(--text);font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.detail-btn:hover{background:rgba(232,113,26,.1);border-color:var(--accent);color:var(--accent)}
.detail-btn.danger{border-color:rgba(255,61,61,.3)}
.detail-btn.danger:hover{background:rgba(255,61,61,.1);border-color:var(--red);color:var(--red)}
.detail-btn.success{border-color:rgba(0,230,118,.3)}
.detail-btn.success:hover{background:rgba(0,230,118,.1);border-color:var(--green);color:var(--green)}
.detail-btn:disabled{opacity:.3;cursor:not-allowed}
#logViewer{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:10px;margin-top:10px;font-family:'SF Mono',monospace;font-size:9px;color:var(--dim);line-height:1.6;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;display:none}
#logViewer.open{display:block}
.detail-status-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.detail-status-dot{width:10px;height:10px;border-radius:50%;animation:pulse 2s infinite}
/* View switcher */
#viewSwitch{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:300;display:flex;gap:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden}
.vs-btn{padding:6px 16px;font-size:10px;letter-spacing:2px;color:var(--dim);cursor:pointer;transition:all .2s;border:none;background:none;text-transform:uppercase;font-family:inherit}
.vs-btn.active{background:var(--accent);color:#000;font-weight:600}
.vs-btn:hover:not(.active){background:rgba(255,255,255,.06);color:var(--text)}
/* Products view */
#productsView{position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;background:var(--bg);overflow-y:auto;display:none;padding:100px 40px 80px}
#productsView.open{display:block}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.product-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:all .3s;cursor:default;position:relative;overflow:hidden}
.product-card:hover{border-color:var(--accent);background:rgba(232,113,26,.03);transform:translateY(-2px)}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .3s}
.product-card:hover::before{opacity:1}
.pc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.pc-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:1px}
.pc-subtitle{font-size:10px;color:var(--dim);letter-spacing:1px}
.pc-desc{font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:12px}
.pc-features{display:flex;flex-wrap:wrap;gap:5px}
.pc-feat{font-size:9px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:4px;color:var(--dim);letter-spacing:.5px}
.pc-feat:hover{border-color:var(--accent);color:var(--accent)}
.pc-status{position:absolute;top:16px;right:16px;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.products-header{text-align:center;margin-bottom:30px}
.products-header h2{font-size:12px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.products-header p{font-size:10px;color:var(--dim);letter-spacing:2px}
/* Light theme overrides */
[data-theme="light"]{--bg:#f5f3ef;--text:#1a1a2e;--dim:#888}
[data-theme="light"] body{background:radial-gradient(ellipse at 50% 30%,#faf8f5 0%,#f0ede8 40%,#e8e5e0 70%);color:var(--text)}
[data-theme="light"] #hud{background:linear-gradient(180deg,rgba(245,243,239,.95),rgba(245,243,239,.6),transparent)}
[data-theme="light"] #detail{background:linear-gradient(0deg,rgba(245,243,239,.98),rgba(245,243,239,.9),transparent)}
[data-theme="light"] #skills-panel{background:linear-gradient(90deg,rgba(245,243,239,.98) 80%,transparent)}
[data-theme="light"] #settings-float{background:rgba(245,243,239,.9);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .product-card{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .product-card:hover{background:rgba(232,113,26,.04)}
[data-theme="light"] .pc-feat{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .skill-item:hover{background:rgba(232,113,26,.06)}
[data-theme="light"] .skill-search{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1)}
[data-theme="light"] #logViewer{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.06)}
[data-theme="light"] .detail-btn{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1);color:var(--text)}
[data-theme="light"] .vs-btn{color:#555}
[data-theme="light"] #detail{background:linear-gradient(0deg,rgba(245,243,239,.98),rgba(245,243,239,.95),transparent)}
[data-theme="light"] #detail .info{color:#555}
[data-theme="light"] #detail .info b{color:#1a1a2e}
[data-theme="light"] .detail-btn{background:rgba(0,0,0,.04)!important;border-color:rgba(0,0,0,.12)!important;color:#333!important}
[data-theme="light"] .legend{color:#666;opacity:.9}
[data-theme="light"] .legend-dot{border-color:#888}
[data-theme="light"] #viewSwitch{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12)}
[data-theme="light"] .pc-title{color:#1a1a2e}
[data-theme="light"] .pc-desc{color:#555}
[data-theme="light"] .pc-subtitle{color:#777}
[data-theme="light"] .pc-details{color:#555}
[data-theme="light"] .pc-details b{color:#1a1a2e}
[data-theme="light"] .pc-expand-btn{color:#555;border-color:rgba(0,0,0,.15)}
[data-theme="light"] .products-header h2{color:var(--accent)}
[data-theme="light"] .products-header p{color:#666}
[data-theme="light"] .zone-label{opacity:.35;fill:#666!important}
[data-theme="light"] .node-c{fill:#ffffff!important;stroke-width:1.8}
[data-theme="light"] .node-c+circle{fill:none!important}
[data-theme="light"] svg text[font-size="7.5"]{fill:#555!important;opacity:.7!important}
[data-theme="light"] svg text[font-size="9"]{fill:#333!important;opacity:.9!important}
[data-theme="light"] #cortex path:not([d*="M"]){stroke-opacity:1}
[data-theme="light"] svg g path{stroke-opacity:1}
[data-theme="light"] #productsView{background:var(--bg)}
[data-theme="light"] .grid-rect{opacity:0}
.pc-expand-btn{background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:4px 10px;color:var(--dim);font-size:9px;cursor:pointer;transition:all .2s;margin-top:10px;letter-spacing:1px}
.pc-expand-btn:hover{border-color:var(--accent);color:var(--accent)}
.pc-details{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:var(--dim);line-height:1.8}
.pc-details.open{display:block}
.pc-details b{color:var(--text);font-weight:500}
.pc-detail-section{margin-bottom:8px}
.pc-detail-section h4{font-size:9px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;opacity:.7}
[data-theme="light"] .pc-expand-btn{border-color:rgba(0,0,0,.1)}
[data-theme="light"] .pc-details{border-top-color:rgba(0,0,0,.08)}
#activity-feed{position:fixed;bottom:20px;right:180px;z-index:90;width:260px;max-height:200px;overflow-y:auto;background:rgba(5,5,8,.85);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px;backdrop-filter:blur(10px);font-size:9px;font-family:'SF Mono',monospace}
#activity-feed h3{font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;opacity:.7}
.af-item{padding:3px 0;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:6px;align-items:baseline}
.af-time{color:var(--accent);opacity:.5;flex-shrink:0}
.af-msg{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.af-new{animation:afFadeIn .3s ease}
@keyframes afFadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
[data-theme="light"] #activity-feed{background:rgba(245,243,239,.9);border-color:rgba(0,0,0,.08)}

/* ── Unified Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(5,5,8,.85);backdrop-filter:blur(8px);flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:200}
[data-theme="light"] .header{background:rgba(245,243,239,.9);border-color:rgba(0,0,0,.08)}
.header-left{display:flex;align-items:center;gap:10px}
.logo-link{display:flex;align-items:center;text-decoration:none}
.header img{width:34px;height:34px;border-radius:8px}
.header h1{font-size:14px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;font-weight:300;margin:0}
.header-right{display:flex;align-items:center;gap:6px}
.page-nav{display:flex;align-items:center;gap:1px;position:absolute;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:2px}
[data-theme="light"] .page-nav{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12)}
.nav-link{padding:5px 14px;color:var(--dim);text-decoration:none;font-size:12px;font-weight:500;border-radius:4px;transition:all .15s;white-space:nowrap;text-align:center}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--accent);background:rgba(232,113,26,.10)}
.ico{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.menu-btn{background:none;border:1px solid rgba(255,255,255,.1);color:var(--dim);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px;position:relative}
.menu-btn:hover{border-color:var(--accent);color:var(--text);background:rgba(255,255,255,.04)}
.menu-btn:active{transform:scale(.93)}
.menu-notif-dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:var(--accent,#a78bfa);border-radius:50%;border:2px solid var(--surface,#1a1a2e);display:none;animation:notifPulse 2s infinite}
.menu-notif-dot.active{display:block}
@keyframes notifPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
.sp-item.notif-highlight{border-color:var(--accent,#a78bfa);background:rgba(167,139,250,0.1);box-shadow:0 0 0 1px var(--accent,#a78bfa)}
[data-theme="light"] .menu-btn{border-color:rgba(0,0,0,.15);color:#555}
[data-theme="light"] .menu-btn:hover{border-color:var(--accent);color:#1a1a2e;background:rgba(0,0,0,.04)}
/* ── Side Panel ── */
.side-panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9990}
.side-panel-overlay.open{display:block}
.side-panel{position:fixed;top:0;right:-300px;width:300px;height:100%;background:rgba(5,5,8,.98);border-left:1px solid rgba(255,255,255,.06);z-index:9991;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.3)}
.side-panel.open{right:0}
[data-theme="light"] .side-panel{background:rgba(245,243,239,.98);border-color:rgba(0,0,0,.08)}
.side-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
[data-theme="light"] .side-panel-header{border-color:rgba(0,0,0,.08)}
.side-panel-header h2{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2px}
.side-panel-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s}
.side-panel-close:hover{color:var(--text);background:rgba(255,255,255,.04)}
.side-panel-body{padding:12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1}
.sp-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.06);border-radius:6px;background:rgba(255,255,255,.02);cursor:pointer;transition:all .15s;text-decoration:none;color:var(--text);font-size:13px;font-weight:500}
.notif-bell{position:relative;font-weight:400}.notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;background:#a78bfa;color:#fff;font-size:10px;font-weight:700;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;line-height:1;pointer-events:none}.notif-badge.hidden{display:none}
.sp-item:hover{border-color:var(--accent);background:rgba(232,113,26,.04);color:var(--text)}
.sp-item svg{flex-shrink:0}
.sp-item-label{flex:1;text-align:center}
.sp-divider{height:1px;background:rgba(255,255,255,.06);margin:6px 0}
[data-theme="light"] .sp-item{border-color:rgba(0,0,0,.08);background:rgba(0,0,0,.02)}
[data-theme="light"] .sp-item:hover{background:rgba(232,113,26,.04);border-color:var(--accent)}
[data-theme="light"] .sp-divider{background:rgba(0,0,0,.08)}
@media (max-width:768px){
  .page-nav{position:fixed;bottom:0;left:0;right:0;z-index:9998;transform:none;border-radius:0;padding:6px 0;justify-content:center;background:rgba(5,5,8,.95);border-top:1px solid rgba(255,255,255,.06);gap:0;overflow-x:auto}
  [data-theme="light"] .page-nav{background:rgba(245,243,239,.95);border-color:rgba(0,0,0,.08)}
  .nav-link{padding:8px 8px;font-size:10px}
  .side-panel{width:280px;right:-280px}
}
</style>
</head>
<body>
<!-- Unified Header -->
<div class="header">
  <div class="header-left">
    <a href="/" class="logo-link"><img src="https://i.imgur.com/jD1X5W8.png" alt="CODEC"></a>
    <h1>CORTEX</h1>
  </div>
  <nav class="page-nav">
    <a href="/" class="nav-link">Home</a>
    <a href="/chat" class="nav-link">Chat</a>
    <a href="/voice" class="nav-link">Voice</a>
    <a href="/vibe" class="nav-link">Vibe</a>
    <a href="/tasks" class="nav-link">Tasks</a>
  </nav>
  <div class="header-right">
    <button class="menu-btn" onclick="openSidePanel()" title="Home" id="menuBtn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="menu-notif-dot" id="menuNotifDot"></span></button>
  </div>
</div>
<!-- Side Panel -->
<div class="side-panel-overlay" id="sidePanelOverlay" onclick="closeSidePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header"><h2>MENU</h2><button class="side-panel-close" onclick="closeSidePanel()">&times;</button></div>
  <div class="side-panel-body">

var _voiceOn=localStorage.getItem('codec-voice')==='true';

// Theme
function toggleCortexTheme(){
  var current = document.documentElement.dataset.theme;
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = next === 'dark' ? '' : 'light';
  localStorage.setItem('codec-theme', next);
  document.getElementById('themeToggle').textContent = next === 'light' ? '\u{1F319}' : '\u2600';
  document.getElementById('themeToggle').style.borderColor = next === 'light' ? 'rgba(0,0,0,.1)' : 'rgba(255,255,255,.1)';
}
(function(){
  var saved = localStorage.getItem('codec-theme') || 'dark';
  if(saved === 'light'){document.documentElement.dataset.theme='light';}
  // When embedded as iframe, listen for theme changes from parent page
  window.addEventListener('storage', function(e){
    if(e.key === 'codec-theme'){
      var t = e.newValue || 'dark';
      document.documentElement.dataset.theme = t === 'light' ? 'light' : '';
      var btn = document.getElementById('themeToggle');
      if(btn){
        btn.textContent = t === 'light' ? '\u{1F319}' : '\u2600';
        btn.style.borderColor = t === 'light' ? 'rgba(0,0,0,.1)' : 'rgba(255,255,255,.1)';
      }
    }
  });
})();

var nodeMap = {};
NODES.forEach(function(n){ nodeMap[n.id] = n; });
var healthStatus = {};

// ── SVG Icon renderer ──
function renderIcon(cx, cy, iconName, size, color) {
  var d = ICONS[iconName];
  if (!d) return '';
  var s = size / 24;
  var tx = cx - size/2;
  var ty = cy - size/2;
  return '<g transform="translate('+tx+','+ty+') scale('+s+')">' +
    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>' +
    '</g>';
}

// ── Render ──
function render() {
  var w = window.innerWidth, h = window.innerHeight;
  svg.setAttribute('viewBox', ((-pan.x/pan.scale))+' '+((-pan.y/pan.scale))+' '+(w/pan.scale)+' '+(h/pan.scale));

  var html = '<defs>';
  html += '<filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  html += '<filter id="glowHard"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  html += '<radialGradient id="nodeGrad" cx="35%" cy="35%"><stop offset="0%" stop-color="#fff" stop-opacity=".08"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>';
  html += '</defs>';

  // Background grid (subtle)
  html += '<pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">';
  html += '<path d="M50,0 L0,0 L0,50" fill="none" stroke="#0e0e18" stroke-width=".4"/>';
  html += '</pattern>';
  html += '<rect class="grid-rect" width="2400" height="1400" fill="url(#grid)" x="-400" y="-200"/>';

  // Zone subtle bg blobs
  ZONES.forEach(function(z) {
    html += '<circle cx="'+z.x+'" cy="'+(parseInt(z.y)+60)+'" r="120" fill="'+z.color+'" opacity=".012"/>';
  });

  // Zone labels
  ZONES.forEach(function(z) {
    html += '<text x="'+z.x+'" y="'+z.y+'" text-anchor="middle" class="zone-label" fill="'+z.color+'">'+z.label.toUpperCase()+'</text>';
  });

  // Edges
  EDGES.forEach(function(e, i) {
    var from = nodeMap[e.from], to = nodeMap[e.to];
    if (!from || !to) return;
    var dx = to.x-from.x, dy = to.y-from.y;
    var dist = Math.sqrt(dx*dx+dy*dy) || 1;
    var nx = dx/dist, ny = dy/dist;
    var x1 = from.x+nx*from.r, y1 = from.y+ny*from.r;
    var x2 = to.x-nx*to.r, y2 = to.y-ny*to.r;
    var mx = (x1+x2)/2+(y2-y1)*0.12, my = (y1+y2)/2-(x2-x1)*0.12;
    var path = 'M'+x1+','+y1+' Q'+mx+','+my+' '+x2+','+y2;
    var isDash = e.style === 'dashed';
    var op = isDash ? '.1' : '.22';
    html += '<path d="'+path+'" fill="none" stroke="'+(e.color||'#333')+'" stroke-width="1.2" opacity="'+op+'"'+(isDash?' stroke-dasharray="5,4"':'')+'/>';
    // Flow particles (only on solid connections)
    if (!isDash) {
      html += '<circle r="1.8" fill="'+(e.color||'#E8711A')+'" opacity=".6"><animateMotion dur="'+(2.5+i%3)+'s" repeatCount="indefinite" path="'+path+'"/></circle>';
    }
    if (e.label) {
      html += '<text x="'+mx+'" y="'+(my-5)+'" text-anchor="middle" fill="'+(e.color||'#444')+'" font-size="7.5" opacity=".35">'+e.label+'</text>';
    }
  });

  // Nodes
  NODES.forEach(function(n) {
    var status = healthStatus[n.id] || 'unknown';
    var ringColor = status==='ok'?'#00e676':status==='err'?'#ff3d3d':n.color;
    var glow = status==='ok'?'filter="url(#glow)"':status==='err'?'filter="url(#glowHard)"':'';
    var ringOp = status==='ok'?'.5':status==='err'?'.7':'.25';

    // Health ring
    html += '<circle cx="'+n.x+'" cy="'+n.y+'" r="'+(n.r+4)+'" fill="none" stroke="'+ringColor+'" stroke-width="1.5" opacity="'+ringOp+'" '+glow+'/>';
    // Main body
    html += '<circle cx="'+n.x+'" cy="'+n.y+'" r="'+n.r+'" fill="'+n.color+'0a" stroke="'+n.color+'" stroke-width="1.2" style="cursor:pointer" onclick="showDetail(\''+n.id+'\')" class="node-c"/>';
    // Inner gradient
    html += '<circle cx="'+n.x+'" cy="'+n.y+'" r="'+n.r+'" fill="url(#nodeGrad)" style="pointer-events:none"/>';
    // Pulse for active services
    if (n.port && status==='ok') {
      html += '<circle cx="'+n.x+'" cy="'+n.y+'" r="'+(n.r-3)+'" fill="'+n.color+'" opacity=".04"><animate attributeName="r" values="'+(n.r-8)+';'+(n.r)+';'+(n.r-8)+'" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".04;.1;.04" dur="4s" repeatCount="indefinite"/></circle>';
    }
    // Icon
    var iconSize = Math.min(n.r * 0.8, 18);
    html += renderIcon(n.x, n.y - 4, n.icon, iconSize, n.color);
    // Label below
    html += '<text x="'+n.x+'" y="'+(n.y+n.r+13)+'" text-anchor="middle" fill="'+n.color+'" font-size="9" font-weight="500" opacity=".75" style="pointer-events:none">'+n.label+'</text>';
    // Port badge
    if (n.port) {
      html += '<rect x="'+(n.x-13)+'" y="'+(n.y+n.r+17)+'" width="26" height="12" rx="6" fill="'+n.color+'" opacity=".75"/>';
      html += '<text x="'+n.x+'" y="'+(n.y+n.r+26)+'" text-anchor="middle" fill="#000" font-size="7.5" font-weight="700">'+n.port+'</text>';
    }
  });

  svg.innerHTML = html;
}

// ── Detail Panel ──
function showDetail(id) {
  if (id === 'skills') { openSkills(); return; }
  var n = nodeMap[id]; if (!n) return;
  var d = document.getElementById('detail');
  document.getElementById('detailTitle').textContent = n.label + (n.port ? ' [:'+n.port+']' : '');
  var status = healthStatus[id] || 'checking...';
  var statusColor = status==='ok'?'var(--green)':status==='err'?'var(--red)':'var(--dim)';
  var statusDotClass = status==='ok'?'ok':status==='err'?'err':'warn';
  var conns = [];
  EDGES.forEach(function(e) {
    if (e.from===id) conns.push('&rarr; '+(nodeMap[e.to]||{label:'?'}).label+(e.label?' <span style="color:var(--dim)">('+e.label+')</span>':''));
    if (e.to===id) conns.push('&larr; '+(nodeMap[e.from]||{label:'?'}).label+(e.label?' <span style="color:var(--dim)">('+e.label+')</span>':''));
  });

  // Determine if this node can be restarted/has logs
  var restartable = ['qwen','vision','whisper','kokoro','dashboard','dispatch','heartbeat','watcher'].indexOf(id) !== -1;
  var hasLogs = restartable || ['f18','f16','f13','wake','screenshot','document'].indexOf(id) !== -1;

  var actionsHtml = '<div class="detail-actions">';
  if (hasLogs) actionsHtml += '<button class="detail-btn" onclick="viewLogs(\''+id+'\')">View Logs</button>';
  if (restartable) actionsHtml += '<button class="detail-btn success" onclick="restartService(\''+id+'\')">Restart</button>';
  if (n.port) actionsHtml += '<a class="detail-btn" href="http://localhost:'+n.port+'/" target="_blank">Open :'+n.port+'</a>';
  actionsHtml += '</div>';

  document.getElementById('detailInfo').innerHTML =
    '<div class="detail-status-bar"><span class="detail-status-dot dot '+statusDotClass+'"></span><span style="color:'+statusColor+';font-weight:600">'+status.toUpperCase()+'</span></div>'+
    '<b>Zone:</b> '+(n.zone||'-').charAt(0).toUpperCase()+(n.zone||'').slice(1)+'<br>'+
    '<b>File:</b> '+n.file+'<br>'+
    (n.port?'<b>Port:</b> '+n.port+'<br>':'')+
    '<b>Info:</b> '+n.info+'<br>'+
    '<b>Connections:</b> '+conns.length+'<br>'+
    actionsHtml+
    '<div id="logViewer"></div>';
  d.classList.add('open');
  document.getElementById('settings-float').style.display='none';
  document.getElementById('activity-feed').style.display='none';
  document.getElementById('legend').style.display='none';
}
function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  document.getElementById('settings-float').style.display='';
  document.getElementById('activity-feed').style.display='';
  document.getElementById('legend').style.display='';
}

function viewLogs(id) {
  var lv = document.getElementById('logViewer');
  if (lv.classList.contains('open') && lv.dataset.service === id) {
    lv.classList.remove('open'); return;
  }
  lv.dataset.service = id;
  lv.classList.add('open');
  lv.textContent = 'Loading logs...';
  fetch('/api/cortex/logs/' + id).then(function(r){return r.json();}).then(function(data) {
    lv.textContent = data.logs || 'No logs available';
    lv.scrollTop = lv.scrollHeight;
  }).catch(function() { lv.textContent = 'Failed to load logs'; });
}

function restartService(id) {
  if (!confirm('Restart ' + (nodeMap[id]||{}).label + '?')) return;
  var hdrs = {'Content-Type':'application/json'};
  var cm = document.cookie.match(/codec_csrf=([^;]+)/);
  if (cm) hdrs['x-csrf-token'] = cm[1];
  fetch('/api/cortex/restart/' + id, {method:'POST', headers:hdrs}).then(function(r){return r.json();}).then(function(data) {
    if (data.ok) {
      healthStatus[id] = 'warn';
      render(); updateStats();
      alert('Restarted ' + data.pm2_name);
      // Re-check health after 5s
      setTimeout(checkHealth, 5000);
    } else {
      alert('Failed: ' + (data.error || 'unknown'));
    }
  }).catch(function() { alert('Request failed'); });
}

// ── Pan & Zoom ──
svg.addEventListener('mousedown',function(e){ if(e.target.classList.contains('node-c'))return; pan.dragging=true;pan.startX=e.clientX-pan.x;pan.startY=e.clientY-pan.y;pan.moved=false; });
window.addEventListener('mousemove',function(e){ if(!pan.dragging)return;pan.moved=true;pan.x=e.clientX-pan.startX;pan.y=e.clientY-pan.startY;render(); });
window.addEventListener('mouseup',function(){
  if(pan.dragging && !pan.moved && document.getElementById('detail').classList.contains('open')){closeDetail();}
  pan.dragging=false;
});
svg.addEventListener('wheel',function(e){ e.preventDefault();var d=e.deltaY>0?.92:1.08;pan.scale=Math.max(.3,Math.min(3,pan.scale*d));render(); },{passive:false});
// Touch
var td=0;
svg.addEventListener('touchstart',function(e){ if(e.touches.length===1){pan.dragging=true;pan.startX=e.touches[0].clientX-pan.x;pan.startY=e.touches[0].clientY-pan.y;} if(e.touches.length===2){td=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);} });
svg.addEventListener('touchmove',function(e){ e.preventDefault(); if(e.touches.length===1&&pan.dragging){pan.x=e.touches[0].clientX-pan.startX;pan.y=e.touches[0].clientY-pan.startY;render();} if(e.touches.length===2){var d2=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(td>0){pan.scale=Math.max(.3,Math.min(3,pan.scale*(d2/td)));render();}td=d2;} },{passive:false});
svg.addEventListener('touchend',function(){pan.dragging=false;td=0;});

// ── Health Polling (via proxy — no CORS issues) ──
function checkHealth() {
  fetch('/api/cortex/health').then(function(r){return r.json();}).then(function(data) {
    // Map proxy results
    var serviceNodes = {qwen:1,vision:1,whisper:1,kokoro:1,dashboard:1};
    Object.keys(data).forEach(function(k){ healthStatus[k] = data[k]; });
    // Everything else: if dashboard is up, mark logical nodes as ok
    NODES.forEach(function(n) {
      if (!serviceNodes[n.id] && !healthStatus[n.id]) {
        healthStatus[n.id] = data.dashboard === 'ok' ? 'ok' : 'warn';
      }
    });
    render(); updateStats();
    lastCheckTime = Date.now();
  }).catch(function() {
    // Fallback: just check dashboard directly
    fetch('/api/health').then(function(r) {
      healthStatus['dashboard'] = r.ok ? 'ok' : 'err';
      NODES.forEach(function(n){ if(!healthStatus[n.id]) healthStatus[n.id] = r.ok?'ok':'warn'; });
      render(); updateStats();
      lastCheckTime = Date.now();
    }).catch(function() {
      healthStatus['dashboard'] = 'err'; render(); updateStats();
      lastCheckTime = Date.now();
    });
  });
}

function updateStats() {
  var ok=0, err=0;
  NODES.forEach(function(n){ if(healthStatus[n.id]==='ok')ok++; else if(healthStatus[n.id]==='err')err++; });
  var unk = NODES.length - ok - err;
  var h = '<div class="stat"><span class="dot ok"></span>'+ok+' online</div>';
  if (err) h += '<div class="stat"><span class="dot err"></span>'+err+' down</div>';
  if (unk) h += '<div class="stat"><span class="dot warn"></span>'+unk+'</div>';
  h += ' <span id="last-check"></span>';
  document.getElementById('stats').innerHTML = h;
}

// ── Skills Panel ──
var allSkills = [];

function loadSkills() {
  fetch('/api/cortex/skills').then(function(r){return r.json();}).then(function(data) {
    allSkills = data.skills || [];
    // Update the Skills node label with real count
    var skillNode = nodeMap['skills'];
    if (skillNode) { skillNode.label = 'Skills x' + data.count; render(); }
    renderSkillsList(allSkills);
  }).catch(function(){});
}

function renderSkillsList(skills) {
  var html = '';
  skills.forEach(function(s) {
    var triggers = (s.triggers || []).slice(0, 3).join(', ');
    html += '<div class="skill-item"><span class="skill-dot"></span><span class="skill-name">' + s.name + '</span><span class="skill-triggers">' + triggers + '</span></div>';
  });
  document.getElementById('skillList').innerHTML = html;
  document.getElementById('skillCount').textContent = skills.length + ' skills loaded';
}

function filterSkills(q) {
  q = q.toLowerCase();
  var filtered = allSkills.filter(function(s) {
    return s.name.toLowerCase().indexOf(q) !== -1 || (s.triggers || []).some(function(t) { return t.toLowerCase().indexOf(q) !== -1; });
  });
  renderSkillsList(filtered);
}

function openSkills() {
  document.getElementById('skills-panel').classList.add('open');
  if (!allSkills.length) loadSkills();
}
function closeSkills() { document.getElementById('skills-panel').classList.remove('open'); }

function switchView(view) {
  var btns = document.querySelectorAll('.vs-btn');
  btns.forEach(function(b){b.classList.remove('active');});
  if (view === 'products') {
    btns[1].classList.add('active');
    document.getElementById('cortex').style.display = 'none';
    document.getElementById('settings-float').style.display = 'none';
    document.getElementById('activity-feed').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    document.getElementById('productsView').classList.add('open');
    renderProducts();
  } else {
    btns[0].classList.add('active');
    document.getElementById('cortex').style.display = '';
    document.getElementById('settings-float').style.display = '';
    document.getElementById('activity-feed').style.display = '';
    document.getElementById('legend').style.display = '';
    document.getElementById('productsView').classList.remove('open');
  }
}

      if (d.agents) html += '<div class="pc-detail-section"><h4>Agent Crews</h4>' + d.agents + '</div>';
      if (d.scheduling) html += '<div class="pc-detail-section"><h4>Scheduling</h4>' + d.scheduling + '</div>';
      if (d.features) html += '<div class="pc-detail-section"><h4>Features</h4>' + (typeof d.features === 'string' ? d.features : d.features.join(', ')) + '</div>';

  });
  // Supporting systems card
  html += '<div class="product-card" style="grid-column:1/-1">';
  html += '<div class="pc-header"><div class="pc-icon" style="background:rgba(102,102,128,.15);border:1px solid rgba(102,102,128,.3)">🌐</div><div><div class="pc-title">CODEC Overview</div><div class="pc-subtitle">Dashboard Anywhere</div></div></div>';
  html += '<div class="pc-desc">Private dashboard accessible from any device, anywhere. Cloudflare Tunnel or Tailscale VPN — no port forwarding, no third-party relay. Send commands, view the screen, launch voice calls, manage agents — all from a browser.</div>';

  ['Dashboard :8090','Cloudflare Tunnel','Tailscale VPN','MCP Server','Task Scheduler','Heartbeat Monitor','Alerts (TG/Email)','Prometheus Metrics','Remote Approval','Memory FTS5','PM2 Process Manager','Skill Marketplace','CORTEX Visualizer','Audit Stream'].forEach(function(f) {
    html += '<span class="pc-feat">'+f+'</span>';

  html += '</div></div>';
  html += '</div>';

}

// ── Settings Float ──
function loadSettings() {
  fetch('/api/config').then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json();}).then(function(cfg) {
    var llm = cfg.llm || {};
    var tts = cfg.tts || {};
    var stt = cfg.stt || {};
    var wake = cfg.wake || {};
    var model = (llm.llm_model || 'unknown').split('/').pop();
    var html = '';
    html += '<div class="setting-row"><b>LLM</b><span class="setting-val">' + model + '</span></div>';
    html += '<div class="setting-row"><b>Voice</b><span class="setting-val">' + (tts.tts_voice || '?') + '</span></div>';
    html += '<div class="setting-row"><b>STT</b><span class="setting-val">' + (stt.stt_engine || '?') + '</span></div>';
    html += '<div class="setting-row"><b>Wake</b><span class="setting-val">' + (wake.wake_word_enabled ? 'ON' : 'OFF') + '</span></div>';
    html += '<div class="setting-row"><b>TTS</b><span class="setting-val">' + (tts.tts_engine || '?') + '</span></div>';
    document.getElementById('settingsContent').innerHTML = html;
  }).catch(function(){ document.getElementById('settingsContent').textContent = 'Offline'; });
}

function toggleProductDetails(id) {
  var el = document.getElementById('pd-' + id);
  if (!el) return;
  var btn = el.previousElementSibling;
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    if (btn) btn.textContent = 'Show Details';
  } else {
    el.classList.add('open');
    if (btn) btn.textContent = 'Hide Details';
  }
}

// ── Live Activity Feed ──
var lastActivityLine = '';
function pollActivity() {
  fetch('/api/cortex/logs/dispatch').then(function(r){return r.json();}).then(function(data) {
    var lines = (data.logs || '').split('\n').filter(function(l) {
      return l.indexOf('[CODEC]') !== -1 || l.indexOf('[TTS]') !== -1;
    });
    var recent = lines.slice(-8);
    if (recent.length && recent[recent.length-1] !== lastActivityLine) {
      lastActivityLine = recent[recent.length-1];
      var html = '';
      recent.forEach(function(line) {
        var timeMatch = line.match(/(\d{2}:\d{2}:\d{2})/);
        var time = timeMatch ? timeMatch[1].slice(0,5) : '--:--';
        var msg = line.replace(/.*\[CODEC\]\s*/, '').replace(/.*\[TTS\]\s*/, 'TTS: ').replace(/^\d+\|open-co\s*\|\s*/, '').trim();
        if (msg.length > 2) {
          html += '<div class="af-item af-new"><span class="af-time">'+time+'</span><span class="af-msg">'+msg.substring(0,60)+'</span></div>';
        }
      });
      if (html) document.getElementById('activityList').innerHTML = html;
    }
  }).catch(function(){});
}

// ── Init ──
render();
checkHealth();
setInterval(checkHealth, 15000);
loadSkills();
loadSettings();
pollActivity();
setInterval(pollActivity, 3000);
// Update "last check" timer

    var ago = Math.round((Date.now() - lastCheckTime) / 1000);

// Auto-fit: compute bounding box of all nodes and scale to viewport
function fitToScreen() {
  var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.forEach(function(n){
    if(n.x-n.r-30<minX)minX=n.x-n.r-30;
    if(n.y-n.r-50<minY)minY=n.y-n.r-50;
    if(n.x+n.r+30>maxX)maxX=n.x+n.r+30;
    if(n.y+n.r+50>maxY)maxY=n.y+n.r+50;
  });
  var w=window.innerWidth, h=window.innerHeight;
  var bw=maxX-minX, bh=maxY-minY;
  var scaleX=w/bw, scaleY=h/bh;
  pan.scale=Math.min(scaleX,scaleY)*0.88;
  pan.x=(w-bw*pan.scale)/2-minX*pan.scale;
  pan.y=(h-bh*pan.scale)/2-minY*pan.scale;
  render();
}
setTimeout(fitToScreen,100);
window.addEventListener('resize',fitToScreen);

document.getElementById('themeToggle').textContent = savedTheme === 'light' ? '\u{1F319}' : '\u2600';

      var bell=document.getElementById('notifBellBtn');

    }).catch(function(){})

  pollNotifCount();setInterval(pollNotifCount,30000);
  var bell=document.getElementById('notifBellBtn');
  if(bell)bell.addEventListener('click',function(){
    fetch('/api/notifications/read-all',{method:'POST'}).catch(function(){});
    var b=document.getElementById('notifBadge');if(b){b.textContent='0';b.classList.add('hidden')}
    var dot=document.getElementById('menuNotifDot');if(dot)dot.classList.remove('active');

  });
})();
